name: inventory-management
services:
  db:
    image: mysql:8.0
    container_name: vehicle-inventory-db
    restart: always
    environment:
      MYSQL_DATABASE: vehicle_inventory
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vehicle-inventory-backend
    restart: always
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/vehicle_inventory?serverTimezone=UTC&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpassword
    depends_on:
      - db
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vehicle-inventory-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
